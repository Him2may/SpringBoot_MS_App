
spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,refresh,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_NAME:localhost}:8761/eureka/
  instance:
#    ip-address: 127.0.0.1
#    hostname: localhost
#    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}