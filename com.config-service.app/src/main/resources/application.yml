server:
  port: 9090

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config
  profiles:
    active: native

management:
  endpoints:
    web:
      exposure:
        include: health,refresh,info,metrics
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
#    ip-address: 127.0.0.1
    hostname: localhost
#    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}