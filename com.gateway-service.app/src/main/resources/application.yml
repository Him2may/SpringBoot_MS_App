server:
  port: 9191

spring:
  application:
    name: gateway-service
  config:
#    import: optional:configserver:http://localhost:9090
    import: configserver:http://${CONFIG_SERVER_URL:localhost}:9090


  cloud:
    gateway:
      server:
        webflux:
          global-cors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposed-headers:
                  - Authorization
                allowCredentials: true

          routes:
          - id: security-service
            uri: lb://SECURITY-SERVICE
            predicates:
              - Path=/api/auth/**
            filters:
              - DedupeResponseHeader=Access-Control-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

          - id: auth-swagger-ui
            uri: lb://SECURITY-SERVICE
            predicates:
              - Path=/swagger-ui/**
            filters:
              - DedupeResponseHeader=Access-Control-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

          - id: auth-swagger-doc
            uri: lb://SECURITY-SERVICE
            predicates:
              - Path=/v3/api-docs/**
            filters:
              - DedupeResponseHeader=Access-Control-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

          - id: employee-service
            uri: lb://EMPLOYEE-SERVICE
            predicates:
              - Path=/api/employee/**

          - id: department-service
            uri: lb://DEPARTMENT-SERVICE
            predicates:
              - Path=/api/department/**

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.boot.context.config: DEBUG


